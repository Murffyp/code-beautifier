<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Beautifier</title>
    <!-- JS for Pretier's CSS Parser -->
    <script src="https://unpkg.com/prettier@2/standalone.js"></script>
    <script src="https://unpkg.com/prettier@2/parser-postcss.js"></script>\
    <script src="https://unpkg.com/prettier@2/parser-babel.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap');

        :root {
            --bg: #0d0d0f;
            --surface: #141418;
            --surface2: #1c1c22;
            --border: #2a2a35;
            --accent: #00a2d3;
            --accent2: #6ca6c1;
            --text: #00a2d3;
            --code-text: #e8e8f0;
            --muted: #6b8ea0;
            --muted2: #00a2d322;
            --btn-h: 40px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
            gap: 8px;
        }

        h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
        .shadow { text-shadow: 2px 2px var(--accent2); }

        .main-container {
            display: flex;
            flex-direction: column;
            width: 80vw;
            max-width: 1200px;
/*            gap: 12px;*/
        }

        .tabs {
            display: flex;
            flex-direction: row;
            gap: 4px;
/*            border-bottom: 1px solid var(--border);  */
/*            padding-bottom: 4px;  */
        }

        .tab {
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 6px 6px 0 0;
            font-size: 14px;
            font-weight: 500;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid transparent;
            user-select: none;
            transition: all 0.15s;
        }

        .tab:hover { color: var(--text); }

        .tab.active {
            color: var(--text);
            border-color: var(--border);
            border-bottom-color: var(--bg);
            background: var(--surface2);
        }

        .panel { 
            display: none; 
            flex-direction: column; 
            gap: 12px; 
        }
        .panel.active { display: flex; }

        textarea {
            width: 100%;
            min-height: 35vh;
            background: var(--surface2);
            color: var(--code-text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            resize: vertical;
            outline: none;
        }

        textarea:focus { border-color: var(--accent2); }

        .buttons {
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            height: calc(var(--btn-h) + 16px);
            margin-top: 12px;
        }

        .btn {
            height: var(--btn-h);
            background: var(--surface2);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 500;
            border-radius: 8px;
            padding: 0 20px;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 2px var(--accent), -2px -2px 2px #777777;
            transition: box-shadow 0.15s, transform 0.1s;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 1px 1px 1px var(--accent), -1px -1px 1px #444;
        }

        .error { 
            color: #ff6b6b; 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 13px; 
            min-height: 20px; 
            white-space: pre;  /* Preserves white space and formatting of the content (error message in thsi case)*/
        }
        

        textarea::selection {
            background: #ff000066;  /* red highlight with transparency */
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="container title" style="display:flex;flex-direction:column;align-items:center;">
        <h1 class="shadow">Code Beautifier</h1>
    </div>

    <div class="tabs">    
        <div id="jsonTab" class="tab active" data-tab="json">JSON</div>
        <div id="htmlTab" class="tab" data-tab="html">HTML</div>
        <div id="cssTab" class="tab" data-tab="css">CSS</div>
        <div id="jsTab" class="tab" data-tab="js">JS</div>
        <div id="mdTab" class="tab" data-tab="md">Markdown</div>
    </div>

    <div id="panel" class="panel active">
        <textarea id="input-text" placeholder="Paste JSON here..."></textarea>
        <div class="buttons">
			<input type="file" id="file" accept=".json" style="display:none">
            <div class="btn" id="btn-clear">Clear</div>
            <div class="btn" id="btn-load">Load File</div>
            <div class="btn" id="btn-format">Format</div>
            <div class="btn" id="btn-copy">Copy</div>
        </div>
        <div class="error" id="error-text"></div>
        <textarea id="output-text" placeholder="Formatted JSON will appear here..." readonly></textarea>
    </div>

</div>

<script>

//tab caching variables
const tabCache = {
    json: '',
    html: '',
    css: '',
    js: '',
    md: ''
};
let curError = '';
	
	document.getElementById('btn-load').addEventListener('click', () => {
        document.getElementById('file').click();
    });

    document.getElementById('file').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            document.getElementById('input-text').value = ev.target.result;
        };
        reader.readAsText(file);
    });




const langConfig = {
	json: {
       	inputPlaceholder: 'Paste JSON here...',
	    outputPlaceholder: 'Formatted JSON will appear here...',
       	btnLabel: 'Format & Validate',
	    fileAccept: '.json',
       	formatter: formatJSON,  // function reference
       	id: 'jsonTab'
   },
    html: {
    	inputPlaceholder: 'Paste HTML here...',
   		outputPlaceholder: 'Formatted HTML will appear here...',
  		btnLabel: 'Format',
   		fileAccept: '.html,.htm',
   		formatter: formatHTML,
   		id: 'htmlTab'
    },
    css: {
     	inputPlaceholder: 'Paste CSS here...',
     	outputPlaceholder: 'Formatted CSS will appear here...',
     	btnLabel: 'Format',
     	fileAccept: '.css,.scss',
     	formatter: formatCSS,
     	id: 'cssTab'
    },
	js: {
   		inputPlaceholder: 'Paste HTML here...',
   		outputPlaceholder: 'Formatted HTML will appear here...',
   		btnLabel: 'Format',
   		fileAccept: '.html,.htm',
   		formatter: formatJS,
   		id: 'jsTab'
	},
	md: {
   		inputPlaceholder: 'Paste MD here...',
   		outputPlaceholder: 'Formatted MD will appear here...',
   		btnLabel: 'Format',
   		fileAccept: '.md',
   		formatter: formatMD,
   		id: 'mdTab'
	}
    		// etc
}   
let lastTab = 'json';
    function switchTab(tabName) {
		const curTab = tabName;
		const config = langConfig[curTab]
		const lastConfig = langConfig[lastTab]
		const jsonTab = document.getElementById('jsonTab');
		const htmlTab = document.getElementById('htmlTab');
		const cssTab = document.getElementById('cssTab');
		const jsTab = document.getElementById('jsTab');
		const mdTab = document.getElementById('md');
		const inputText = document.getElementById('input-text');
		const outputText = document.getElementById('output-text');
		const acceptFile = document.getElementById('file');
		const btnLabel = document.getElementById('btn-format');
		tabCache[lastTab] = inputText.value;
		
		
		changeActive(lastConfig.id, config.id) ;
		changeLanguage(curTab, inputText, outputText, acceptFile, btnLabel);
		if (tabCache[tabName] === '') {
			inputText.value = '';
		}
		else {
			inputText.value = tabCache[tabName];
		}
		lastTab = curTab;
	}

function changeActive(deactivate, activate) {   //pass tab ID
	// remove from both first
	document.getElementById(deactivate).classList.remove('active');
	document.getElementById(activate).classList.add('active');
}

function changeLanguage(lang, input, output, accept, label) {
	const config = langConfig[lang];
	input.placeholder = config.inputPlaceholder;
	output.placeholder = config.outputPlaceholder;
	accept.accept = config.fileAccept;
	label.textContext = config.btnLabel;
}
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            switchTab(tab.dataset.tab)
        });
    });

    // Clear Input Button
    document.getElementById('btn-clear').addEventListener('click', () => {
        const error = document.getElementById('error-text');
        let clearInput = document.getElementById('input-text');
        clearInput.value = '';
        error.textContent = '';
    });

    // Copy buttons
    document.getElementById('btn-copy').addEventListener('click', () => {
        const out = document.getElementById('output-text').value;
        if (out) navigator.clipboard.writeText(out);
    });
    
function highlightErrorLine(lineNum) {
    const inputText = document.getElementById('input-text');
    if (!lineNum) return;
    const lines = inputText.value.split('\n');
    if (lineNum > lines.length) return;
    let start = 0;
    for (let i = 0; i < lineNum - 1; i++) {
        start += lines[i].length + 1;
    }
    const end = start + lines[lineNum - 1].length;
    inputText.setSelectionRange(start, end);
    inputText.focus();
}    
    
    // Format button
    document.getElementById('btn-format').addEventListener('click', () => {
        const config = langConfig[lastTab]
        config.formatter()
    });


    // JSON formatter
    function formatJSON() {
        const input = document.getElementById('input-text').value;
        const error = document.getElementById('error-text');
        const output = document.getElementById('output-text');
        error.textContent = '';
		if (input === '') {
			console.log('ERROR INPUT EMPTY');
			error.textContent = 'Error: Please Enter JSON to Beautify';
		}
		else {	    
            try {
                output.value = JSON.stringify(JSON.parse(input), null, 2);
                error.textContent = '';
            } catch(e) {
                error.textContent = 'Error: ' + e.message + '.';
                error.innerText += '\nLine with error has been selected';
                output.value = '';
                const lineMatch = e.message.match(/line (\d+)/);
                if (lineMatch) highlightErrorLine(parseInt(lineMatch[1]));
            }
		}
    }

    // HTML formatter
    function formatHTML() {
    }
    
    // CSS formatter
    function formatCSS() {
        const input = document.getElementById('input-text').value;
        const error = document.getElementById('error-text');
        const output = document.getElementById('output-text');
        
		if (input === '') {
			console.log('ERROR INPUT EMPTY');
			error.textContent = 'Error: Please Enter JSON to Beautify';
		}
		else {	    
            try {
                output.value = prettier.format(input, { parser: "css",  plugins: [prettierPlugins.postcss] });
                error.textContent = '';
            } catch(e) {
                error.textContent = 'Error: ' + e.message + '.';
                error.innerText += '\nLine with error has been selected';
                output.value = '';
            }
		}
    }
    
    // JS formatter
    function formatJS() {
        const input = document.getElementById('input-text').value;
        const error = document.getElementById('error-text');
        const output = document.getElementById('output-text');
        
		if (input === '') {
			console.log('ERROR INPUT EMPTY');
			error.textContent = 'Error: Please Enter JSON to Beautify';
		}
		else {	    
            try {
                output.value = prettier.format(input, { parser: "css",  plugins: [prettierPlugins.postcss] });
                error.textContent = '';
            } catch(e) {
                error.textContent = 'Error: ' + e.message + '.';
                error.innerText += '\nLine with error has been selected';
                output.value = '';
                const lineMatch = e.message.match(/line (\d+)/);
                if (lineMatch) highlightErrorLine(parseInt(lineMatch[1]));
            }
		}
    }
    // MD formatter
    function formatMD() {
    }

    
    // format button event listener

//
//    // HTML, CSS, JS, MD formatters — Prettier coming next session!
//    ['html','css','js','md'].forEach(lang => {
//        document.getElementById('btn-format-' + lang).addEventListener('click', () => {
//            document.getElementById('error-' + lang).textContent = 'Formatter coming soon!';
//        });
//    });
 
</script>
</body>
</html>
